<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Traceability</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px 16px;
        }
        .wrap { max-width: 980px; margin: 0 auto; }
        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
        .searchbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
        }
        .searchbar input {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
        }
        .searchbar button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .searchbar button:hover { opacity: 0.9; }
        .status { font-size: 13px; color: #94a3b8; margin: 8px 0 16px; min-height: 18px; }
        .group {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .group-head {
            padding: 14px 16px;
            background: #15203a;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .out-batch {
            font-family: monospace;
            font-size: 16px;
            font-weight: 800;
            color: #a78bfa;
        }
        .pending { color: #fbbf24; }
        .pill {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 999px;
            background: #334155;
            color: #cbd5e1;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid #273349;
        }
        th { color: #94a3b8; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
        td.batch { font-family: monospace; color: #93c5fd; font-weight: 600; }
        td.qty { text-align: right; font-weight: 700; color: #34d399; }
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
            font-size: 14px;
        }
        .arrow { color: #64748b; font-size: 12px; }
        .meta { color: #64748b; font-size: 11px; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>🧬 Material Traceability</h1>
        <div class="sub">Enter any PO number and press Trace — input rolls/batches are pulled from SAP automatically. Use "Rebuild from SAP" only to force-refresh.</div>

        <div class="searchbar">
            <input id="po-input" type="text" placeholder="Enter PO number (e.g. 733)" />
            <input id="batch-input" type="text" placeholder="or Output batch (optional)" />
            <button id="search-btn">Trace</button>
            <button id="backfill-btn" style="background:linear-gradient(135deg,#0f766e,#0b4f48)">Rebuild from SAP</button>
        </div>

        <div class="status" id="status"></div>
        <div id="results"></div>
    </div>

    <script>
        const poInput = document.getElementById('po-input');
        const batchInput = document.getElementById('batch-input');
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function fmtDate(d) {
            if (!d) return '';
            const dt = new Date(d);
            return isNaN(dt) ? '' : dt.toLocaleString();
        }

        async function runTrace() {
            const po = poInput.value.trim();
            const batch = batchInput.value.trim();
            if (!po && !batch) {
                statusEl.textContent = 'Enter a PO number or output batch.';
                return;
            }
            statusEl.textContent = 'Loading…';
            resultsEl.innerHTML = '';
            try {
                const url = `/api/traceability/${encodeURIComponent(po || '_')}` +
                    (batch ? `?batch=${encodeURIComponent(batch)}` : '');
                const resp = await fetch(url);
                const json = await resp.json();
                if (!json.success) throw new Error(json.message || 'Failed');
                render(json);
            } catch (e) {
                statusEl.textContent = '❌ ' + (e.message || e);
            }
        }

        function render(data) {
            const groups = data.genealogy || [];
            if (!groups.length) {
                statusEl.textContent = '';
                resultsEl.innerHTML = '<div class="empty">No issued rolls found for this PO / batch yet.</div>';
                return;
            }
            statusEl.textContent = `${data.count} issued roll(s) across ${groups.length} output batch group(s).`;

            resultsEl.innerHTML = groups.map(g => {
                const isPending = !g.outputBatch;
                const head = isPending
                    ? '<span class="out-batch pending">⏳ Not yet finished (pending output batch)</span>'
                    : `<span class="arrow">Output →</span> <span class="out-batch">${esc(g.outputBatch)}</span>`;
                const rows = g.inputs.map(i => `
                    <tr>
                        <td>${esc(i.itemCode)}</td>
                        <td class="batch">${esc(i.batchNumber)}</td>
                        <td class="qty">${i.quantity}</td>
                        <td>${esc(i.warehouse || '')}</td>
                        <td>${esc(i.operator || '')}<div class="meta">${esc(i.machine || '')}</div></td>
                        <td class="meta">${esc(fmtDate(i.issuedAt))}</td>
                    </tr>`).join('');
                return `
                    <div class="group">
                        <div class="group-head">
                            <div>${head}</div>
                            <span class="pill">${g.inputs.length} roll(s) · ${g.totalQty} total</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th><th>Roll / Batch</th><th style="text-align:right">Qty</th>
                                    <th>Warehouse</th><th>Operator / Machine</th><th>Issued At</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            }).join('');
        }

        async function runBackfill() {
            const po = poInput.value.trim();
            if (!po) { statusEl.textContent = 'Enter a PO number to rebuild from SAP.'; return; }
            statusEl.textContent = 'Rebuilding from SAP goods issues…';
            try {
                const resp = await fetch(`/api/traceability/backfill/${encodeURIComponent(po)}`, { method: 'POST' });
                const json = await resp.json();
                if (!json.success) throw new Error(json.message || 'Failed');
                statusEl.textContent = `Rebuilt: ${json.recorded} roll(s) recorded. Loading…`;
                await runTrace();
            } catch (e) {
                statusEl.textContent = '❌ ' + (e.message || e);
            }
        }

        document.getElementById('search-btn').addEventListener('click', runTrace);
        document.getElementById('backfill-btn').addEventListener('click', runBackfill);
        poInput.addEventListener('keydown', e => { if (e.key === 'Enter') runTrace(); });
        batchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runTrace(); });

        // Allow ?po=733 deep link
        const params = new URLSearchParams(location.search);
        if (params.get('po')) { poInput.value = params.get('po'); runTrace(); }
    </script>
</body>
</html>
